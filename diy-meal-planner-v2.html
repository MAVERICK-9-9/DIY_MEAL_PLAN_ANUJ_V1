<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DIY Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ─── TOKENS ─────────────────────────────── */
:root {
  --bg:       #f7f2eb;
  --bg2:      #efe9df;
  --card:     #fdfaf5;
  --card2:    #f5f0e8;
  --ink:      #241c10;
  --ink-mid:  #6b5c45;
  --ink-dim:  #a8967e;
  --border:   #e0d5c3;
  --border2:  #cfc3ae;

  --amber:    #d4880a;  --amber-bg: #fdf3dc;  --amber-r: rgba(212,136,10,.18);
  --jade:     #3d8a5e;  --jade-bg:  #e5f5ec;  --jade-r:  rgba(61,138,94,.18);
  --rose:     #c25444;  --rose-bg:  #faeae7;  --rose-r:  rgba(194,84,68,.18);
  --indigo:   #4a6db5;  --indigo-bg:#e8eef8;  --indigo-r:rgba(74,109,181,.18);
  --plum:     #8856a0;  --plum-bg:  #f2eaf7;  --plum-r:  rgba(136,86,160,.18);

  --sh-sm: 0 1px 4px rgba(36,28,16,.07);
  --sh-md: 0 3px 14px rgba(36,28,16,.09);
  --sh-lg: 0 8px 32px rgba(36,28,16,.13);

  --r-sm:4px; --r-md:12px; --r-lg:18px; --r-pill:100px;
  --header-h: 64px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
body {
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}
button,input { font-family:inherit; }
button { cursor:pointer; border:none; background:none; }

/* ─── HEADER ─────────────────────────────── */
.app-header {
  background:var(--card);
  border-bottom:1.5px solid var(--border);
  height:var(--header-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
  position:sticky; top:0; z-index:100;
  box-shadow:var(--sh-sm);
  gap:10px;
}
.logo { display:flex; align-items:center; gap:9px; flex-shrink:0; }
.logo-icon {
  width:36px; height:36px; background:var(--ink);
  border-radius:var(--r-sm); display:flex; align-items:center;
  justify-content:center; font-size:1.05rem;
}
.logo-text { line-height:1.15; }
.logo-text .main {
  font-family:'Lora',serif; font-weight:700; font-size:1rem;
  color:var(--ink); letter-spacing:-0.01em; display:block;
}
.logo-text .sub {
  font-size:0.6rem; font-weight:500; letter-spacing:.1em;
  text-transform:uppercase; color:var(--ink-dim);
}
.today-pill {
  background:var(--amber-bg); border:1.5px solid var(--amber);
  border-radius:var(--r-pill); padding:5px 11px;
  display:flex; flex-direction:column; align-items:flex-end; line-height:1.2;
  flex-shrink:0;
}
.today-pill .dp { font-size:0.76rem; font-weight:700; color:var(--amber); }
.today-pill .ds { font-size:0.6rem; color:var(--ink-mid); font-weight:500; }

/* ─── PAGE LAYOUT ────────────────────────── */
.page { max-width:900px; margin:0 auto; padding:16px 12px 40px; display:flex; flex-direction:column; gap:20px; }

/* ─── SECTION DIVIDER ────────────────────── */
.section-divider {
  display:flex; align-items:center; gap:10px; margin:4px 0 -4px;
}
.section-divider span {
  font-family:'Lora',serif; font-size:1.1rem; font-style:italic;
  color:var(--ink); white-space:nowrap;
}
.section-divider::before,.section-divider::after {
  content:''; flex:1; height:1.5px; background:var(--border);
}
.section-divider::after { flex:3; }

/* ─── SUMMARY BAR ────────────────────────── */
.summary-bar {
  background:var(--ink); color:#f7f2eb;
  border-radius:var(--r-lg); padding:13px 16px;
  display:flex; align-items:center; gap:12px;
  box-shadow:var(--sh-md);
}
.summary-stats { display:flex; gap:18px; flex-shrink:0; }
.stat-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stat-val { font-family:'Lora',serif; font-size:1.4rem; font-weight:600; line-height:1; }
.stat-label { font-size:0.58rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; opacity:.5; }
.stat-div { width:1px; height:28px; background:rgba(247,242,235,.15); }
.progress-wrap { flex:1; min-width:0; }
.progress-label { font-size:0.68rem; font-weight:500; opacity:.6; margin-bottom:4px; }
.progress-bar { height:5px; background:rgba(247,242,235,.15); border-radius:var(--r-pill); overflow:hidden; }
.progress-fill { height:100%; background:var(--amber); border-radius:var(--r-pill); transition:width .4s ease; }
.clear-btn {
  background:rgba(247,242,235,.1); border:1.5px solid rgba(247,242,235,.2);
  color:rgba(247,242,235,.7); border-radius:var(--r-pill);
  padding:7px 12px; font-size:0.7rem; font-weight:600;
  transition:all .15s; white-space:nowrap; flex-shrink:0;
}
.clear-btn:active { background:rgba(247,242,235,.18); transform:scale(.95); }

/* ─── CATEGORY CARD ──────────────────────── */
.cat-card {
  background:var(--card); border-radius:var(--r-lg);
  border:1.5px solid var(--border); overflow:hidden;
  box-shadow:var(--sh-sm);
}
.cat-trigger {
  display:flex; align-items:center; gap:11px; padding:13px 15px;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
  touch-action:manipulation; width:100%; text-align:left;
}
.cat-trigger:active { background:var(--bg2); }
.cat-icon-wrap {
  width:40px; height:40px; border-radius:var(--r-md);
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; flex-shrink:0;
}
.cat-info { flex:1; min-width:0; }
.cat-name { font-family:'Lora',serif; font-size:1rem; font-weight:600; line-height:1.2; }
.cat-meta { font-size:0.68rem; font-weight:500; margin-top:2px; opacity:.55; }
.cat-chevron { font-size:0.75rem; color:var(--ink-dim); transition:transform .3s ease; flex-shrink:0; }
.cat-card.open .cat-chevron { transform:rotate(180deg); }

.cat-breakfast .cat-icon-wrap { background:var(--amber-bg); }
.cat-breakfast .cat-name      { color:var(--amber); }
.cat-lunch    .cat-icon-wrap  { background:var(--jade-bg); }
.cat-lunch    .cat-name       { color:var(--jade); }
.cat-snacks   .cat-icon-wrap  { background:var(--plum-bg); }
.cat-snacks   .cat-name       { color:var(--plum); }
.cat-dinner   .cat-icon-wrap  { background:var(--indigo-bg); }
.cat-dinner   .cat-name       { color:var(--indigo); }

.cat-body { max-height:0; overflow:hidden; transition:max-height .38s cubic-bezier(.4,0,.2,1); }
.cat-card.open .cat-body { max-height:3000px; }
.cat-divider { height:1.5px; background:var(--border); margin:0 14px; }

/* chips */
.items-wrap { padding:11px 13px 7px; display:flex; flex-wrap:wrap; gap:7px; }
.meal-chip {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 12px 7px 9px; border-radius:var(--r-pill);
  border:1.5px solid var(--border); background:var(--bg);
  font-size:0.8rem; font-weight:500; color:var(--ink);
  cursor:pointer; transition:all .18s ease;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none;
}
.meal-chip:active { transform:scale(.95); }
.chip-check {
  width:17px; height:17px; border-radius:50%;
  border:1.5px solid var(--border2); display:flex;
  align-items:center; justify-content:center;
  font-size:0.58rem; color:transparent; flex-shrink:0;
  transition:all .18s; background:var(--card);
}
.meal-chip.checked { color:white; border-color:transparent; }
.meal-chip.checked .chip-check { background:rgba(255,255,255,.25); border-color:rgba(255,255,255,.3); color:white; }
.cat-breakfast .meal-chip.checked { background:var(--amber); }
.cat-lunch     .meal-chip.checked { background:var(--jade); }
.cat-snacks    .meal-chip.checked { background:var(--plum); }
.cat-dinner    .meal-chip.checked { background:var(--indigo); }

.chip-remove {
  width:14px; height:14px; border-radius:50%; background:rgba(0,0,0,.12);
  display:none; align-items:center; justify-content:center;
  font-size:0.55rem; margin-left:1px; flex-shrink:0; font-weight:700;
  transition:background .15s;
}
.meal-chip.custom:hover .chip-remove,
.meal-chip.custom.show-remove .chip-remove { display:flex; }

.add-row { padding:3px 13px 14px; display:flex; gap:7px; align-items:center; }
.add-input {
  flex:1; background:var(--bg2); border:1.5px solid var(--border);
  border-radius:var(--r-pill); padding:9px 15px;
  font-size:0.86rem; color:var(--ink); outline:none; min-width:0;
  transition:border-color .2s, box-shadow .2s;
}
.add-input::placeholder { color:var(--ink-dim); }
.add-input:focus { border-color:var(--ink-mid); box-shadow:0 0 0 3px rgba(107,92,69,.1); background:var(--card); }
.add-input.error { border-color:var(--rose); animation:shake .3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.add-btn {
  width:38px; height:38px; border-radius:50%; color:white;
  font-size:1.2rem; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.add-btn:active { transform:scale(.88); box-shadow:none; }
.cat-breakfast .add-btn { background:var(--amber); box-shadow:0 3px 10px var(--amber-r); }
.cat-lunch     .add-btn { background:var(--jade);  box-shadow:0 3px 10px var(--jade-r); }
.cat-snacks    .add-btn { background:var(--plum);  box-shadow:0 3px 10px var(--plum-r); }
.cat-dinner    .add-btn { background:var(--indigo);box-shadow:0 3px 10px var(--indigo-r); }

/* ─── WEEK PLAN SECTION ──────────────────── */
.plan-controls {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.btn-ink {
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 18px; border-radius:var(--r-pill);
  background:var(--ink); color:var(--bg);
  font-size:0.82rem; font-weight:600;
  box-shadow:var(--sh-md); transition:all .18s;
  -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.btn-ink:active { transform:scale(.95); box-shadow:none; }

.btn-outline {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 16px; border-radius:var(--r-pill);
  background:var(--card); color:var(--ink-mid);
  border:1.5px solid var(--border2);
  font-size:0.82rem; font-weight:600;
  transition:all .18s; -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.btn-outline:active { transform:scale(.95); border-color:var(--ink); color:var(--ink); }

.btn-jade {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 16px; border-radius:var(--r-pill);
  background:var(--jade); color:white;
  font-size:0.82rem; font-weight:600;
  box-shadow:0 3px 10px var(--jade-r); transition:all .18s;
  -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.btn-jade:active { transform:scale(.95); box-shadow:none; }

.btn-rose {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 16px; border-radius:var(--r-pill);
  background:var(--rose); color:white;
  font-size:0.82rem; font-weight:600;
  box-shadow:0 3px 10px var(--rose-r); transition:all .18s;
  -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.btn-rose:active { transform:scale(.95); box-shadow:none; }

.plan-num-badge {
  margin-left:auto; background:var(--amber-bg);
  border:1.5px solid var(--amber); border-radius:var(--r-pill);
  padding:7px 13px; font-size:0.72rem; font-weight:700;
  color:var(--amber); letter-spacing:.04em; white-space:nowrap; flex-shrink:0;
}

/* Save form inline */
.save-form-row {
  display:none; align-items:center; gap:8px; flex-wrap:wrap;
}
.save-form-row.open { display:flex; }
.save-name-input {
  flex:1; min-width:160px; background:var(--card);
  border:1.5px solid var(--border); border-radius:var(--r-pill);
  padding:9px 14px; font-size:0.84rem; color:var(--ink); outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.save-name-input::placeholder { color:var(--ink-dim); }
.save-name-input:focus { border-color:var(--ink-mid); box-shadow:0 0 0 3px rgba(107,92,69,.1); }

/* ─── WEEK TABLE ─────────────────────────── */
/* Printable area for JPEG */
#planCapture {
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  box-shadow:var(--sh-md);
}

.plan-table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

/* Column header row: Day names */
.plan-table thead tr th {
  padding:9px 6px 8px;
  text-align:center;
  background:var(--card2);
  border-bottom:1.5px solid var(--border);
  border-right:1px solid var(--border);
  font-family:'Lora',serif;
  font-size:0.82rem;
  font-weight:600;
  color:var(--ink);
  line-height:1.2;
}
.plan-table thead tr th:last-child { border-right:none; }
.plan-table thead tr th.corner-cell {
  background:var(--bg2);
  font-family:'Outfit',sans-serif;
  font-size:0.58rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-dim);
  width:62px;
}
.plan-table thead tr th.today-col {
  background:var(--amber-bg);
  color:var(--amber);
}
.plan-table thead tr th .day-short-sub {
  display:block; font-family:'Outfit',sans-serif;
  font-size:0.58rem; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--ink-dim); margin-top:1px;
}
.plan-table thead tr th.today-col .day-short-sub { color:var(--amber); opacity:.7; }

/* Meal rows */
.plan-table tbody tr td {
  padding:8px 7px;
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  vertical-align:top;
  font-size:0.72rem;
  font-weight:500;
  color:var(--ink);
  line-height:1.35;
  position:relative;
}
.plan-table tbody tr:last-child td { border-bottom:none; }
.plan-table tbody tr td:last-child { border-right:none; }

/* Row label cell */
.plan-table tbody tr td.row-label {
  background:var(--bg2);
  padding:8px 7px;
  width:62px;
  text-align:center;
  vertical-align:middle;
}
.row-label-inner {
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
.row-label-icon { font-size:0.9rem; line-height:1; }
.row-label-text {
  font-size:0.55rem; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase;
}
.row-breakfast .row-label-text { color:var(--amber); }
.row-lunch     .row-label-text { color:var(--jade); }
.row-snacks    .row-label-text { color:var(--plum); }
.row-dinner    .row-label-text { color:var(--indigo); }

/* Row color tinting */
.row-breakfast td:not(.row-label) { background:#fffdf8; }
.row-lunch     td:not(.row-label) { background:#f8fdf9; }
.row-snacks    td:not(.row-label) { background:#fdf8ff; }
.row-dinner    td:not(.row-label) { background:#f8faff; }

/* Today column cells */
.plan-table tbody tr td.today-col { background:var(--amber-bg) !important; }

/* Cell meal name */
.cell-meal {
  display:block;
  padding-right:18px;
  transition:opacity .15s;
}
@keyframes cellFlip {
  0%   { opacity:0; transform:translateY(-4px); }
  100% { opacity:1; transform:translateY(0); }
}
.cell-meal.flipping { animation:cellFlip .22s ease; }

/* Per-cell reshuffle button */
.cell-swap {
  position:absolute; right:4px; top:50%;
  transform:translateY(-50%);
  width:20px; height:20px; border-radius:50%;
  background:var(--bg2); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; color:var(--ink-dim);
  opacity:0; transition:all .15s; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.plan-table tbody tr td:hover .cell-swap,
.plan-table tbody tr td.show-swap .cell-swap { opacity:1; }
.cell-swap:hover { background:var(--ink); color:var(--bg); border-color:var(--ink); }
.cell-swap:active { transform:translateY(-50%) scale(.85); }

/* Capture header (inside #planCapture) */
.capture-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 16px 9px;
  border-bottom:1.5px solid var(--border);
  background:var(--card);
}
.capture-title {
  font-family:'Lora',serif; font-size:0.95rem; font-weight:700; color:var(--ink);
}
.capture-date { font-size:0.68rem; color:var(--ink-dim); font-weight:500; }

/* ─── TEMPLATES ──────────────────────────── */
.templates-section { display:flex; flex-direction:column; gap:8px; }
.templates-label {
  font-size:0.62rem; font-weight:700; letter-spacing:.15em;
  text-transform:uppercase; color:var(--ink-dim);
}
.templates-chips { display:flex; flex-wrap:wrap; gap:7px; }
.tpl-chip {
  display:inline-flex; align-items:center;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--r-pill); overflow:hidden; box-shadow:var(--sh-sm);
  transition:all .15s; max-width:220px;
}
.tpl-chip:hover { border-color:var(--ink-mid); }
.tpl-load {
  padding:8px 3px 8px 13px; font-size:0.78rem; font-weight:600; color:var(--ink);
  cursor:pointer; flex:1; min-width:0; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.tpl-load:hover { color:var(--jade); }
.tpl-date { font-size:0.6rem; color:var(--ink-dim); padding:0 7px 0 4px; }
.tpl-del {
  padding:8px 12px 8px 5px; font-size:0.62rem; color:var(--rose);
  cursor:pointer; opacity:.5; transition:opacity .15s;
  -webkit-tap-highlight-color:transparent;
}
.tpl-del:hover { opacity:1; }
.no-templates { font-size:0.78rem; color:var(--ink-dim); font-style:italic; }

/* ─── TOAST ──────────────────────────────── */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:var(--bg);
  padding:10px 20px; border-radius:var(--r-pill);
  font-size:0.8rem; font-weight:500; white-space:nowrap;
  z-index:999; pointer-events:none; opacity:0;
  transition:all .3s ease; box-shadow:var(--sh-lg);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ─── DOWNLOAD OVERLAY ───────────────────── */
.dl-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(36,28,16,.5); z-index:500;
  align-items:center; justify-content:center;
}
.dl-overlay.show { display:flex; }
.dl-spinner {
  background:var(--card); border-radius:var(--r-lg);
  padding:28px 36px; text-align:center;
  box-shadow:var(--sh-lg); display:flex; flex-direction:column; align-items:center; gap:12px;
}
.dl-spinner .spin-icon { font-size:2rem; animation:spin 1s linear infinite; display:block; }
@keyframes spin { to { transform:rotate(360deg); } }
.dl-spinner p { font-size:0.88rem; color:var(--ink-mid); font-weight:500; }

/* ─── RESPONSIVE ─────────────────────────── */
@media (max-width:600px) {
  .plan-table thead tr th { font-size:0.72rem; padding:8px 4px 7px; }
  .plan-table thead tr th.corner-cell { width:48px; font-size:0.52rem; }
  .plan-table tbody tr td { font-size:0.65rem; padding:6px 5px; }
  .plan-table tbody tr td.row-label { width:48px; padding:6px 4px; }
  .row-label-icon { font-size:0.78rem; }
  .row-label-text { font-size:0.5rem; }
  .cell-swap { width:16px; height:16px; font-size:0.55rem; }
  .plan-controls { gap:6px; }
  .btn-ink,.btn-outline,.btn-jade,.btn-rose { padding:9px 13px; font-size:0.78rem; }
  .plan-num-badge { padding:6px 10px; font-size:0.68rem; }
  .capture-header { padding:9px 12px 8px; }
  .capture-title { font-size:0.88rem; }
}
@media (max-width:380px) {
  .plan-table thead tr th { font-size:0.64rem; padding:7px 3px 6px; }
  .plan-table tbody tr td { font-size:0.6rem; padding:5px 4px; }
  .cell-swap { display:none; }
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="app-header">
  <div class="logo">
    <div class="logo-icon">🥗</div>
    <div class="logo-text">
      <span class="main">Meal Planner</span>
      <span class="sub">DIY · Daily &amp; Weekly</span>
    </div>
  </div>
  <div class="today-pill">
    <span class="dp" id="hDay">—</span>
    <span class="ds" id="hDate">—</span>
  </div>
</header>

<!-- ── MAIN PAGE ── -->
<main class="page">

  <!-- ══ MY MEALS SECTION ══ -->
  <div class="section-divider"><span>🍱 My Meals</span></div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="summary-stats">
      <div class="stat-item">
        <div class="stat-val" id="statChecked">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-item">
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label" id="progLabel">Today's progress</div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <button class="clear-btn" onclick="clearAllChecks()">Clear ✕</button>
  </div>

  <!-- BREAKFAST -->
  <div class="cat-card cat-breakfast open" id="cat-breakfast">
    <button class="cat-trigger" onclick="toggleCat('breakfast')">
      <div class="cat-icon-wrap">🌅</div>
      <div class="cat-info">
        <div class="cat-name">Breakfast</div>
        <div class="cat-meta" id="meta-breakfast">0 items</div>
      </div>
      <span class="cat-chevron">▼</span>
    </button>
    <div class="cat-body">
      <div class="cat-divider"></div>
      <div class="items-wrap" id="items-breakfast"></div>
      <div class="add-row">
        <input class="add-input" id="input-breakfast" placeholder="Add a breakfast item…" onkeydown="handleAddKey(event,'breakfast')">
        <button class="add-btn" onclick="addItem('breakfast')">+</button>
      </div>
    </div>
  </div>

  <!-- LUNCH -->
  <div class="cat-card cat-lunch open" id="cat-lunch">
    <button class="cat-trigger" onclick="toggleCat('lunch')">
      <div class="cat-icon-wrap">☀️</div>
      <div class="cat-info">
        <div class="cat-name">Lunch</div>
        <div class="cat-meta" id="meta-lunch">0 items</div>
      </div>
      <span class="cat-chevron">▼</span>
    </button>
    <div class="cat-body">
      <div class="cat-divider"></div>
      <div class="items-wrap" id="items-lunch"></div>
      <div class="add-row">
        <input class="add-input" id="input-lunch" placeholder="Add a lunch item…" onkeydown="handleAddKey(event,'lunch')">
        <button class="add-btn" onclick="addItem('lunch')">+</button>
      </div>
    </div>
  </div>

  <!-- SNACKS -->
  <div class="cat-card cat-snacks open" id="cat-snacks">
    <button class="cat-trigger" onclick="toggleCat('snacks')">
      <div class="cat-icon-wrap">🫖</div>
      <div class="cat-info">
        <div class="cat-name">Evening Snacks</div>
        <div class="cat-meta" id="meta-snacks">0 items</div>
      </div>
      <span class="cat-chevron">▼</span>
    </button>
    <div class="cat-body">
      <div class="cat-divider"></div>
      <div class="items-wrap" id="items-snacks"></div>
      <div class="add-row">
        <input class="add-input" id="input-snacks" placeholder="Add a snack item…" onkeydown="handleAddKey(event,'snacks')">
        <button class="add-btn" onclick="addItem('snacks')">+</button>
      </div>
    </div>
  </div>

  <!-- DINNER -->
  <div class="cat-card cat-dinner open" id="cat-dinner">
    <button class="cat-trigger" onclick="toggleCat('dinner')">
      <div class="cat-icon-wrap">🌙</div>
      <div class="cat-info">
        <div class="cat-name">Dinner</div>
        <div class="cat-meta" id="meta-dinner">0 items</div>
      </div>
      <span class="cat-chevron">▼</span>
    </button>
    <div class="cat-body">
      <div class="cat-divider"></div>
      <div class="items-wrap" id="items-dinner"></div>
      <div class="add-row">
        <input class="add-input" id="input-dinner" placeholder="Add a dinner item…" onkeydown="handleAddKey(event,'dinner')">
        <button class="add-btn" onclick="addItem('dinner')">+</button>
      </div>
    </div>
  </div>

  <!-- ══ WEEK PLAN SECTION ══ -->
  <div class="section-divider" style="margin-top:8px"><span>📅 Week Plan</span></div>

  <!-- Plan controls -->
  <div class="plan-controls">
    <button class="btn-ink" onclick="shuffleWeek()">⟳ Shuffle Week</button>
    <button class="btn-outline" onclick="toggleSaveForm()">✦ Save Template</button>
    <button class="btn-rose" onclick="downloadJPEG()">⬇ Download JPEG</button>
    <div class="plan-num-badge" id="planNumBadge">Plan #1</div>
  </div>

  <!-- Save form -->
  <div class="save-form-row" id="saveFormRow">
    <input class="save-name-input" id="tplNameInput" placeholder="Name this plan e.g. 'High Protein Week'…"
      onkeydown="if(event.key==='Enter') confirmSave()">
    <button class="btn-jade" onclick="confirmSave()">Save</button>
    <button class="btn-outline" onclick="toggleSaveForm()">Cancel</button>
  </div>

  <!-- Week plan table (also used for capture) -->
  <div id="planCapture">
    <div class="capture-header">
      <span class="capture-title" id="captureTitle">Weekly Meal Plan · Plan #1</span>
      <span class="capture-date" id="captureDate">—</span>
    </div>
    <div style="overflow-x:hidden">
      <table class="plan-table" id="planTable">
        <thead id="planHead"></thead>
        <tbody id="planBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Saved templates -->
  <div class="templates-section">
    <div class="templates-label">Saved Templates</div>
    <div class="templates-chips" id="templatesChips"></div>
  </div>

</main>

<!-- Download overlay -->
<div class="dl-overlay" id="dlOverlay">
  <div class="dl-spinner">
    <span class="spin-icon">⏳</span>
    <p>Generating JPEG…</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══ DATA ═══════════════════════════════════════════════════ */
const DEFAULTS = {
  breakfast:["Besan Chila","Eggs","Sprouts - Moong","Sprouts - Matki","Sprouts - Channa",
             "Oats","Protein Patty","Pohe","Upma","Moog Appe","Ragi Satva","Avocado Toast"],
  lunch:    ["Thalipeeth","Paneer","Chicken Curry","Grilled Chicken Salad","Eggs Curry",
             "Daal","Lentils","Fish","Shrimp Curry","Pulses - Chavali","Pulses - Rajma",
             "Pulses - Chole","Pulses - Matki","Pulses - Chaana","Methi Bhaji","Palak Bhaji",
             "Gawar Bhaji","Dodka Bhaji","Bhopla Bhaji","Soyabin Kheema"],
  snacks:   ["Phutane / Groundnut","Protein Shake","Ladu + Milk","Apple + Peanut Butter",
             "Tea","Makhana","Guava + Nuts","Almonds + Walnuts","Yogurt"],
  dinner:   ["Soup - Tomato/Beetroot","Soup - Pumpkin","Soup - Chicken","Thalipeeth",
             "Besan Chila","Paneer Salad Bowl","Chicken Salad Bowl","Daliya",
             "Veg Stir-fry + Protein","Tikki + Salad","Veggie Loaded Rice / Daliya"]
};

const CATS     = ["breakfast","lunch","snacks","dinner"];
const CAT_META = {
  breakfast:{ label:"Breakfast", icon:"🌅" },
  lunch:    { label:"Lunch",     icon:"☀️" },
  snacks:   { label:"Snacks",    icon:"🫖" },
  dinner:   { label:"Dinner",    icon:"🌙" }
};
const DAYS      = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAY_SHORT = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

/* ═══ STATE ══════════════════════════════════════════════════ */
let S = {
  meals:   { breakfast:[], lunch:[], snacks:[], dinner:[] },
  catOpen: { breakfast:true, lunch:true, snacks:true, dinner:true },
  plan:    [],
  planNum: 1,
  templates: []
};

function save() {
  try { localStorage.setItem('diy_meal_v4', JSON.stringify(S)); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('diy_meal_v4');
    if (!raw) return;
    const d = JSON.parse(raw);
    for (const cat of CATS) {
      const saved = (d.meals && d.meals[cat]) ? d.meals[cat] : [];
      const names = new Set(saved.map(i => i.name.toLowerCase()));
      for (const def of DEFAULTS[cat])
        if (!names.has(def.toLowerCase())) saved.push({ name:def, checked:false, custom:false });
      S.meals[cat]   = saved;
      S.catOpen[cat] = d.catOpen ? (d.catOpen[cat] !== false) : true;
    }
    S.plan      = d.plan      || [];
    S.planNum   = d.planNum   || 1;
    S.templates = d.templates || [];
  } catch(e) {}
}

function initDefaultMeals() {
  for (const cat of CATS)
    if (!S.meals[cat].length)
      S.meals[cat] = DEFAULTS[cat].map(n => ({ name:n, checked:false, custom:false }));
}

/* ═══ HEADER ═════════════════════════════════════════════════ */
function initHeader() {
  const d = new Date();
  const dn = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  document.getElementById('hDay').textContent  = dn[d.getDay()];
  document.getElementById('hDate').textContent = d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('captureDate').textContent =
    'Week of ' + d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

/* ═══ MEALS ══════════════════════════════════════════════════ */
function renderMeals() {
  for (const cat of CATS) renderCat(cat);
  renderSummary();
}

function renderCat(cat) {
  const card  = document.getElementById('cat-' + cat);
  const wrap  = document.getElementById('items-' + cat);
  const meta  = document.getElementById('meta-' + cat);
  const items = S.meals[cat];

  card.classList.toggle('open', !!S.catOpen[cat]);
  meta.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');
  wrap.innerHTML = '';

  items.forEach((item, idx) => {
    const chip = document.createElement('div');
    chip.className = 'meal-chip' + (item.checked?' checked':'') + (item.custom?' custom':'');
    chip.innerHTML = `<div class="chip-check">${item.checked?'✓':''}</div><span>${esc(item.name)}</span>`
      + (item.custom ? `<div class="chip-remove" onclick="removeItem(event,'${cat}',${idx})">✕</div>` : '');
    chip.addEventListener('click', () => toggleCheck(cat, idx));
    if (item.custom) {
      let pt;
      chip.addEventListener('touchstart', () => { pt = setTimeout(() => chip.classList.toggle('show-remove'), 500); }, {passive:true});
      chip.addEventListener('touchend',   () => clearTimeout(pt), {passive:true});
    }
    wrap.appendChild(chip);
  });
}

function renderSummary() {
  let total = 0, checked = 0;
  for (const cat of CATS)
    for (const i of S.meals[cat]) { total++; if (i.checked) checked++; }
  document.getElementById('statChecked').textContent = checked;
  document.getElementById('statTotal').textContent   = total;
  const pct = total > 0 ? Math.round(checked/total*100) : 0;
  document.getElementById('progFill').style.width    = pct + '%';
  document.getElementById('progLabel').textContent   = pct + '% checked today';
}

function toggleCat(cat) {
  S.catOpen[cat] = !S.catOpen[cat];
  save(); renderCat(cat);
}

function toggleCheck(cat, idx) {
  S.meals[cat][idx].checked = !S.meals[cat][idx].checked;
  save(); renderCat(cat); renderSummary();
}

function addItem(cat) {
  const inp  = document.getElementById('input-' + cat);
  const name = inp.value.trim();
  if (!name) { flashErr(inp); return; }
  if (S.meals[cat].some(i => i.name.toLowerCase() === name.toLowerCase())) {
    flashErr(inp); showToast('Item already exists!'); inp.value = ''; return;
  }
  S.meals[cat].push({ name, checked:false, custom:true });
  inp.value = '';
  save(); renderCat(cat); renderSummary();
  const wrap = document.getElementById('items-' + cat);
  requestAnimationFrame(() => wrap.lastChild && wrap.lastChild.scrollIntoView({behavior:'smooth',block:'nearest'}));
}

function removeItem(e, cat, idx) {
  e.stopPropagation();
  S.meals[cat].splice(idx, 1);
  save(); renderCat(cat); renderSummary();
}

function handleAddKey(e, cat) { if (e.key === 'Enter') addItem(cat); }

function clearAllChecks() {
  if (!confirm('Clear all checkmarks for today?')) return;
  for (const cat of CATS) S.meals[cat].forEach(i => i.checked = false);
  save(); renderMeals(); showToast('All checks cleared ✓');
}

/* ═══ WEEK PLAN ══════════════════════════════════════════════ */
function getPool(cat) { return S.meals[cat].map(i => i.name).filter(Boolean); }

function pickWeek(cat) {
  const pool = [...getPool(cat)];
  if (!pool.length) return Array(7).fill('—');
  const out = [];
  for (let i = 0; i < 7; i++) {
    if (!pool.length) pool.push(...getPool(cat));
    out.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
  }
  return out;
}

function generatePlan() {
  const w = {};
  for (const cat of CATS) w[cat] = pickWeek(cat);
  S.plan = DAYS.map((_,i) => ({
    breakfast: w.breakfast[i], lunch: w.lunch[i],
    snacks: w.snacks[i], dinner: w.dinner[i]
  }));
}

function getTodayIdx() {
  const d = new Date().getDay(); return d === 0 ? 6 : d - 1;
}

function renderWeek(animate) {
  const todayIdx = getTodayIdx();
  const head = document.getElementById('planHead');
  const body = document.getElementById('planBody');
  document.getElementById('planNumBadge').textContent   = 'Plan #' + S.planNum;
  document.getElementById('captureTitle').textContent   = 'Weekly Meal Plan · Plan #' + S.planNum;

  /* --- THEAD --- */
  head.innerHTML = '';
  const hRow = document.createElement('tr');
  // corner cell
  const corner = document.createElement('th');
  corner.className = 'corner-cell';
  corner.textContent = 'Day / Meal';
  hRow.appendChild(corner);
  DAYS.forEach((day, di) => {
    const th = document.createElement('th');
    th.className = di === todayIdx ? 'today-col' : '';
    th.innerHTML = `${day.slice(0,3)}<span class="day-short-sub">${DAY_SHORT[di]}${di===todayIdx?' ★':''}</span>`;
    hRow.appendChild(th);
  });
  head.appendChild(hRow);

  /* --- TBODY --- */
  body.innerHTML = '';
  CATS.forEach(cat => {
    const tr = document.createElement('tr');
    tr.className = 'row-' + cat;
    if (animate) tr.style.animation = `cardIn .3s ease both`;

    // row label
    const labelTd = document.createElement('td');
    labelTd.className = 'row-label';
    labelTd.innerHTML = `<div class="row-label-inner">
      <span class="row-label-icon">${CAT_META[cat].icon}</span>
      <span class="row-label-text">${CAT_META[cat].label}</span>
    </div>`;
    tr.appendChild(labelTd);

    // day cells
    DAYS.forEach((_, di) => {
      const td = document.createElement('td');
      td.className = di === todayIdx ? 'today-col' : '';
      td.dataset.day = di; td.dataset.cat = cat;
      td.innerHTML = `
        <span class="cell-meal" id="cell-${di}-${cat}">${esc(S.plan[di][cat] || '—')}</span>
        <button class="cell-swap" title="Swap meal" onclick="reshuffleCell(event,${di},'${cat}')">⟳</button>
      `;
      // touch: show swap button
      td.addEventListener('touchstart', () => {
        document.querySelectorAll('td.show-swap').forEach(t => t !== td && t.classList.remove('show-swap'));
        td.classList.toggle('show-swap');
      }, {passive:true});
      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

function shuffleWeek() {
  generatePlan(); S.planNum++;
  save(); renderWeek(true);
  showToast('⟳ New week plan ready!');
}

function reshuffleCell(e, dayIdx, cat) {
  e.stopPropagation();
  const cur  = S.plan[dayIdx][cat];
  const pool = getPool(cat).filter(m => m !== cur);
  S.plan[dayIdx][cat] = pool.length ? pool[Math.floor(Math.random()*pool.length)] : cur;
  save();
  const el = document.getElementById(`cell-${dayIdx}-${cat}`);
  if (el) { el.classList.remove('flipping'); void el.offsetWidth; el.textContent = S.plan[dayIdx][cat]; el.classList.add('flipping'); }
}

/* ═══ TEMPLATES ══════════════════════════════════════════════ */
function toggleSaveForm() {
  const row = document.getElementById('saveFormRow');
  const isOpen = row.classList.toggle('open');
  if (isOpen) {
    document.getElementById('tplNameInput').value = 'Plan #' + S.planNum;
    setTimeout(() => document.getElementById('tplNameInput').focus(), 80);
  }
}

function confirmSave() {
  const inp  = document.getElementById('tplNameInput');
  const name = inp.value.trim() || ('Plan #' + S.planNum);
  const dateStr = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  S.templates.push({ name, date:dateStr, plan:JSON.parse(JSON.stringify(S.plan)), num:S.planNum });
  save(); renderTemplates();
  document.getElementById('saveFormRow').classList.remove('open');
  showToast(`✦ Saved as "${name}"`);
}

function loadTemplate(idx) {
  const tpl = S.templates[idx];
  S.plan = JSON.parse(JSON.stringify(tpl.plan)); S.planNum = tpl.num;
  save(); renderWeek(true); showToast(`Loaded "${tpl.name}"`);
}

function deleteTemplate(idx) {
  const name = S.templates[idx].name;
  S.templates.splice(idx, 1); save(); renderTemplates(); showToast(`Deleted "${name}"`);
}

function renderTemplates() {
  const cont = document.getElementById('templatesChips');
  if (!S.templates.length) {
    cont.innerHTML = '<div class="no-templates">No saved templates yet — shuffle &amp; save a plan you like!</div>';
    return;
  }
  cont.innerHTML = '';
  S.templates.forEach((tpl, i) => {
    const chip = document.createElement('div');
    chip.className = 'tpl-chip';
    chip.innerHTML = `
      <div class="tpl-load" onclick="loadTemplate(${i})">${esc(tpl.name)}</div>
      <div class="tpl-date">${tpl.date||''}</div>
      <div class="tpl-del"  onclick="deleteTemplate(${i})">✕</div>
    `;
    cont.appendChild(chip);
  });
}

/* ═══ JPEG DOWNLOAD ══════════════════════════════════════════ */
async function downloadJPEG() {
  const overlay = document.getElementById('dlOverlay');
  overlay.classList.add('show');

  // Temporarily hide swap buttons so they don't appear in capture
  document.querySelectorAll('.cell-swap').forEach(b => b.style.opacity = '0');
  document.querySelectorAll('td.show-swap').forEach(t => t.classList.remove('show-swap'));

  try {
    await new Promise(r => setTimeout(r, 120)); // let DOM settle

    const el = document.getElementById('planCapture');
    const canvas = await html2canvas(el, {
      scale: 2.5,
      useCORS: true,
      backgroundColor: '#fdfaf5',
      logging: false,
      removeContainer: true
    });

    const link = document.createElement('a');
    const planName = document.getElementById('captureTitle').textContent.replace(/[^a-z0-9]+/gi,'-').toLowerCase();
    link.download = planName + '.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    showToast('📸 Week plan saved as JPEG!');
  } catch(err) {
    showToast('Could not generate image. Try again.');
    console.error(err);
  } finally {
    document.querySelectorAll('.cell-swap').forEach(b => b.style.opacity = '');
    overlay.classList.remove('show');
  }
}

/* ═══ UTILS ══════════════════════════════════════════════════ */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function flashErr(inp) {
  inp.classList.add('error'); setTimeout(() => inp.classList.remove('error'), 400);
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ═══ BOOT ═══════════════════════════════════════════════════ */
function init() {
  load();
  initDefaultMeals();
  initHeader();
  renderMeals();
  if (!S.plan.length) generatePlan();
  renderWeek(true);
  renderTemplates();
}
init();
</script>
</body>
</html>
